<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>SWGOH Guild Suite</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background: #f5f5f5;
        }

        h1 {
            margin-bottom: 5px;
        }

        .panel {
            background: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 25px;
        }

        .row {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
        }

        select,
        input,
        button {
            padding: 8px;
            font-size: 14px;
        }

        input {
            width: 320px;
        }

        button {
            cursor: pointer;
            margin-left: 10px;
        }

        .info {
            margin-bottom: 20px;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            background: white;
        }

        th,
        td {
            border: 1px solid #ccc;
            padding: 8px;
            text-align: left;
        }

        th {
            background: #eee;
        }

        #status {
            margin-top: 15px;
            color: #555;
            font-style: italic;
        }
    </style>
</head>

<body>

<h1>SWGOH Guild Suite</h1>

<div class="panel">

    <div class="row">
        <label for="searchType">Search type</label>

        <select id="searchType">
            <option value="ally">AllyCode</option>
            <option value="guild">Guild name</option>
        </select>
    </div>

    <div class="row">
        <label for="searchValue">Value</label>

        <input
            id="searchValue"
            type="text"
            placeholder="743985967 or BuzzLighter">

        <button id="searchButton">
            Search
        </button>
    </div>

    <div id="status">
        Using local snapshot.
    </div>

</div>

<div class="info">
    <div id="guildName">Loading...</div>
    <div id="guildMembers"></div>
    <div id="snapshotTime"></div>
</div>

<table>

<thead>
<tr>
    <th>Name</th>
    <th>GP</th>
    <th>Character GP</th>
    <th>Ship GP</th>
    <th>Last Activity</th>
</tr>
</thead>

<tbody id="players">
</tbody>

</table>

<script>

async function loadSnapshot() {

    const response = await fetch("./data/snapshots/latest.json");

    const snapshot = await response.json();

    document.getElementById("guildName").textContent =
        "Guild: " + snapshot.guild.profile.name;

    document.getElementById("guildMembers").textContent =
        "Members: " + snapshot.guild.member.length;

    document.getElementById("snapshotTime").textContent =
        "Updated: " + snapshot.snapshotTime;

    const table = document.getElementById("players");

    table.innerHTML = "";

    snapshot.guild.member.forEach(player => {

        const row = document.createElement("tr");

        row.innerHTML = `
            <td>${player.playerName}</td>
            <td>${player.galacticPower}</td>
            <td>${player.characterGalacticPower}</td>
            <td>${player.shipGalacticPower}</td>
            <td>${new Date(Number(player.lastActivityTime)).toLocaleString()}</td>
        `;

        table.appendChild(row);

    });

}

document
    .getElementById("searchButton")
    .addEventListener("click", () => {

        const type = document.getElementById("searchType").value;
        const value = document.getElementById("searchValue").value.trim();

        if (!value) {
            alert("Please enter a value.");
            return;
        }

        console.log("Search type:", type);
        console.log("Search value:", value);

        document.getElementById("status").textContent =
            "Search functionality will be implemented in the next milestone.";

    });

loadSnapshot();

</script>

</body>
</html>
